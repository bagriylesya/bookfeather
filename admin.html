<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель керування - BOOKFEATHER</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .admin-login {
            max-width: 450px;
            margin: 80px auto;
            background-color: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.12);
        }
        
        .admin-login h2 {
            margin-bottom: 35px;
            text-align: center;
            font-size: 32px;
        }
        
        .admin-panel {
            background-color: white;
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.12);
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .admin-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-btn {
            padding: 18px 35px;
            background-color: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 18px;
            font-family: var(--font-body);
            color: var(--drab-brown);
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            color: var(--blood-red);
        }
        
        .tab-btn.active {
            color: var(--blood-red);
            border-bottom-color: var(--blood-red);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 17px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--cinereous);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 17px;
        }
        
        .form-group textarea {
            resize: vertical;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            transform: scale(1.3);
        }
        
        .admin-book-item {
            display: flex;
            gap: 25px;
            padding: 25px;
            background-color: #f9f3e3;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .admin-book-image {
            width: 90px;
            height: 125px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .admin-book-info {
            flex: 1;
        }
        
        .admin-book-title {
            font-size: 22px;
            margin-bottom: 8px;
            font-family: var(--font-heading);
        }
        
        .admin-book-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1><a href="index.html">BOOKFEATHER</a></h1>
                </div>
            </div>
        </div>
    </header>

    <section class="books-section">
        <div class="container">
            <div class="admin-login" id="admin-login">
                <h2>Вхід в панель керування</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>Пароль:</label>
                        <input type="password" id="admin-password" placeholder="Введіть пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Увійти</button>
                </form>
            </div>

            <div class="admin-panel" id="admin-panel" style="display: none;">
                <div class="admin-header">
                    <h1>Панель керування</h1>
                    <button id="logout-btn" class="btn btn-outline">Вийти</button>
                </div>

                <div class="admin-tabs">
                    <button class="tab-btn active" data-tab="add-book">Додати книгу</button>
                    <button class="tab-btn" data-tab="manage-books">Керування книгами</button>
                </div>

                <div class="tab-content active" id="add-book">
                    <h2 style="font-size: 32px; margin-bottom: 30px;">Додати нову книгу</h2>
                    <form id="add-book-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Назва книги*:</label>
                                <input type="text" name="title" required>
                            </div>
                            <div class="form-group">
                                <label>Автор*:</label>
                                <input type="text" name="author" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Оригінальна назва:</label>
                                <input type="text" name="originalTitle">
                            </div>
                            <div class="form-group">
                                <label>Видавництво:</label>
                                <input type="text" name="publisher">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Категорія*:</label>
                                <select name="category" required>
                                    <option value="">Оберіть категорію</option>
                                    <option value="fiction">Художня література</option>
                                    <option value="detective">Детективи</option>
                                    <option value="fantasy">Фентезі</option>
                                    <option value="psychology">Психологія</option>
                                    <option value="business">Бізнес</option>
                                    <option value="science">Наука</option>
                                    <option value="biography">Біографії</option>
                                    <option value="history">Історія</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Мова:</label>
                                <input type="text" name="language" value="Українська">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Ціна (грн)*:</label>
                                <input type="number" name="price" min="0" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Знижка (%):</label>
                                <input type="number" name="discount" min="0" max="100" value="0">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Рейтинг (1-10):</label>
                                <input type="number" name="rating" min="1" max="10" step="0.1" value="8">
                            </div>
                            <div class="form-group">
                                <label>Кількість оцінок:</label>
                                <input type="number" name="ratingCount" min="0" value="0">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Кількість сторінок:</label>
                                <input type="number" name="pages" min="1">
                            </div>
                            <div class="form-group">
                                <label>Рік видання:</label>
                                <input type="number" name="year" min="1900" max="2030" value="2024">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Обкладинка:</label>
                                <select name="cover">
                                    <option value="Тверда">Тверда</option>
                                    <option value="М'яка">М'яка</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Перекладач:</label>
                                <input type="text" name="translator">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>ISBN:</label>
                                <input type="text" name="isbn">
                            </div>
                            <div class="form-group">
                                <label>Штрих-код:</label>
                                <input type="text" name="barcode">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Розмір (мм):</label>
                                <input type="text" name="size" placeholder="150x210x30">
                            </div>
                            <div class="form-group">
                                <label>Вага (г):</label>
                                <input type="number" name="weight" min="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Ілюстрації:</label>
                            <select name="illustrations">
                                <option value="Без ілюстрацій">Без ілюстрацій</option>
                                <option value="Кольорові">Кольорові</option>
                                <option value="Чорно-білі">Чорно-білі</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>URL обкладинки*:</label>
                            <input type="url" name="image" placeholder="https://example.com/image.jpg" required>
                        </div>

                        <div class="form-group">
                            <label>Короткий опис*:</label>
                            <textarea name="shortDescription" rows="2" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Повний опис*:</label>
                            <textarea name="description" rows="5" required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group checkbox-group">
                                <label>
                                    <input type="checkbox" name="isNew" value="true">
                                    Новинка
                                </label>
                            </div>
                            <div class="form-group checkbox-group">
                                <label>
                                    <input type="checkbox" name="isTop" value="true">
                                    Топ продажів
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary" style="margin-right: 10px;">Додати книгу</button>
                        <button type="reset" class="btn btn-outline">Очистити форму</button>
                    </form>
                </div>

                <div class="tab-content" id="manage-books">
                    <h2 style="font-size: 32px; margin-bottom: 30px;">Керування книгами</h2>
                    <div id="admin-books-list"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
